<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Saarthi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><span>Swasthik</span></div>
        <div class="nav-menu">
            <a href="/dashboard">Dashboard</a>
            <a href="/profile" class="active">Profile</a>
            <a href="#" onclick="logout()" style="color:var(--red)">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Medical Profile</h1>
            <p>Keep your medical information up to date for accurate diagnostics.</p>
        </div>

        <div class="profile-card">
            <form id="profileForm">
                <p class="profile-section-title">Basic Information</p>
                <div class="form-row">
                    <div class="form-group">
                        <label for="blood_group">Blood Group</label>
                        <select id="blood_group" name="blood_group">
                            <option value="">Select blood group</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                        </select>
                    </div>
                </div>

                <p class="profile-section-title">Allergies</p>
                <div class="form-group">
                    <label for="allergies">Known Allergies (medications, latex, food)</label>
                    <textarea id="allergies" name="allergies" rows="3" placeholder="e.g. Penicillin, Shellfish, Latex…"></textarea>
                </div>

                <p class="profile-section-title">Medical History</p>
                <div class="form-group">
                    <label for="past_medical_history">Active Problems / Conditions</label>
                    <textarea id="past_medical_history" name="past_medical_history" rows="4" placeholder="e.g. Type 2 Diabetes (2018), Hypertension…"></textarea>
                </div>
                <div class="form-group">
                    <label for="past_surgical_history">Past Surgical History</label>
                    <textarea id="past_surgical_history" name="past_surgical_history" rows="4" placeholder="e.g. Appendectomy (2015), Knee replacement (2019)…"></textarea>
                </div>

                <p class="profile-section-title">Current Medications</p>
                <div class="form-group">
                    <label for="current_medications">Medications (including OTC &amp; herbal supplements)</label>
                    <textarea id="current_medications" name="current_medications" rows="4" placeholder="e.g. Metformin 500mg twice daily, Lisinopril 10mg…"></textarea>
                </div>

                <p class="profile-section-title">Lifestyle</p>
                <div class="form-group">
                    <label for="alcohol_tobacco">Alcohol / Tobacco / Substance Use</label>
                    <textarea id="alcohol_tobacco" name="alcohol_tobacco" rows="3" placeholder="e.g. Non-smoker, social drinker (2–3 units/week)…"></textarea>
                </div>

                <div style="display:flex;gap:.875rem;align-items:center;padding-top:.5rem">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Save Profile
                    </button>
                    <a href="/dashboard" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
